<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#A6192E" />
    <title>Offline — Impact Hub</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fafafa;
        color: #1a1a1a;
      }
      .card {
        max-width: 22rem;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 0.75rem;
        padding: 2rem 1.5rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .logo {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.75rem;
        margin: 0 auto 1rem;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        font-size: 0.875rem;
        line-height: 1.5;
        color: #525252;
        margin: 0 0 1.25rem;
      }
      button {
        appearance: none;
        border: none;
        border-radius: 0.375rem;
        background: #a6192e;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.625rem 1.25rem;
        cursor: pointer;
      }
      button:active {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/brand/impact-hub-mark.png" alt="" width="56" height="56" />
      <h1>You&rsquo;re offline</h1>
      <p>
        Impact Hub needs an internet connection for bookings, community, and your profile.
        Check your connection and try again.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
