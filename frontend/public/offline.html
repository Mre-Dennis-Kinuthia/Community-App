<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#812926" />
    <title>Connection issue — Impact Hub</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #faf9f6;
        color: #0a1f38;
      }
      .card {
        max-width: 22rem;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid #edeff2;
        border-radius: 0.75rem;
        padding: 2rem 1.5rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .logo {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.75rem;
        margin: 0 auto 1rem;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        font-size: 0.875rem;
        line-height: 1.5;
        color: #1c395c;
        margin: 0 0 1.25rem;
      }
      button {
        appearance: none;
        border: none;
        border-radius: 0.375rem;
        background: #812926;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.625rem 1.25rem;
        cursor: pointer;
        width: 100%;
      }
      button:active {
        opacity: 0.9;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.75rem;
        color: #1c395c99;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/brand/impact-hub-mark.png" alt="" width="56" height="56" />
      <h1 id="title">You&rsquo;re offline</h1>
      <p id="message">
        Impact Hub needs an internet connection for bookings, community, and your profile.
        Check your connection and try again.
      </p>
      <button type="button" id="retry">Try again</button>
      <p class="hint" id="hint" hidden>
        If you are online and this keeps appearing, open the site in your browser instead of the
        home-screen app, or clear this site&rsquo;s data in your browser settings.
      </p>
    </div>
    <script>
      ;(function () {
        var online = navigator.onLine
        var title = document.getElementById("title")
        var message = document.getElementById("message")
        var hint = document.getElementById("hint")
        var retry = document.getElementById("retry")

        if (online) {
          title.textContent = "Couldn\u2019t reach Impact Hub"
          message.textContent =
            "You appear to be online, but we couldn\u2019t load the app. This is usually temporary \u2014 try again in a moment."
          hint.hidden = false
        }

        retry.addEventListener("click", function () {
          retry.disabled = true
          retry.textContent = "Loading\u2026"
          if (online && "serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg) return reg.unregister()
            }).finally(function () {
              window.location.replace(window.location.origin + "/dashboard")
            })
            return
          }
          window.location.reload()
        })
      })()
    </script>
  </body>
</html>
