<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #171717; }
      .foreground { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .foreground { fill: #171717; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <g style="transform: scale(75%); transform-origin: center">
    <!-- Simple "I" for Impact Hub -->
    <rect class="foreground" x="90" y="30" width="60" height="30" rx="6" />
    <rect class="foreground" x="90" y="60" width="60" height="90" rx="6" />
    <rect class="foreground" x="90" y="150" width="60" height="30" rx="6" />
  </g>
</svg>
