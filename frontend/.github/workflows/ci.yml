name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Health route exists
        run: test -f app/api/health/route.ts

      - name: No duplicate admin API (staff uses admin app)
        run: |
          if [ -d app/api/admin ]; then
            echo "::error::Remove app/api/admin/* — use Community-app-admin instead"
            find app/api/admin -type f
            exit 1
          fi

      - run: npx eslint .
